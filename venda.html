<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda seu Carro | DOZE CAR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">DOZE <span>CAR</span></div>
        <nav>
            <ul>
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="usados.html">Carros Usados</a></li>
                <li><a href="venda.html">Vender Carro</a></li>
                <li><a href="servicos.html">Serviços</a></li>
                <li><a href="contato.html">Contato</a></li>
                <li><a href="campanhas.html">Campanhas</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="venda-hero">
            <h1>Venda seu carro para a <span>Doze Car</span></h1>
            <p>Receba uma avaliação justa e o pagamento na hora. Sem burocracia.</p>
        </section>

        <section class="form-container">
            <form action="#" class="sell-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Marca/Modelo</label>
                        <input type="text" placeholder="Ex: Honda Civic 2022" required>
                    </div>
                    <div class="form-group">
                        <label>Quilometragem</label>
                        <input type="number" placeholder="Ex: 15000">
                    </div>
                    <div class="form-group">
                        <label>Seu Nome</label>
                        <input type="text" placeholder="Como podemos te chamar?" required>
                    </div>
                    <div class="form-group">
                        <label>WhatsApp</label>
                        <input type="tel" placeholder="(00) 00000-0000" required>
                    </div>
                </div>

                <div class="form-group full-width">
                    <label>Observações/Opcionais</label>
                    <textarea rows="4" placeholder="Conte-nos sobre o estado do carro e o que ele tem de melhor..."></textarea>
                </div>

                <div class="upload-area">
                    <p>Arraste as fotos do seu carro aqui ou clique para selecionar</p>
                    <input type="file" multiple class="file-input">
                </div>

                <button type="submit" class="btn-submit">Enviar para Avaliação</button>
            </form>
        </section>
    </main>
        <footer class="main-footer">
        <p>© 2026 DOZE CAR - Transparência e Confiança</p>
    </footer>

</body>
</html>
